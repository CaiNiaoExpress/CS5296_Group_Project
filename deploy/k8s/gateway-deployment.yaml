apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-mall-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-mall-gateway
  template:
    metadata:
      labels:
        app: car-mall-gateway
    spec:
      containers:
        - name: gateway
          image: your-registry/car-mall-gateway:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: car-mall-gateway
spec:
  selector:
    app: car-mall-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
